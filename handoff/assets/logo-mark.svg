<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="rl-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F46688"></stop>
      <stop offset="100%" stop-color="#FF9540"></stop>
    </linearGradient>
    <filter id="rl-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>
  <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#rl-grad)" filter="url(#rl-glow)"></rect>
  <rect x="22" y="22" width="20" height="20" rx="4" fill="#0A0A12"></rect>
</svg>